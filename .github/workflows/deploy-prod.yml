# Self-hosted runner on the production VPS: build and copy into place (no SSH/rsync from GitHub).
# `runs-on` matches labels (self-hosted, Linux, X64), not the runner display name (e.g. hetzner).

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/secunit.io/web
  RESTART_SCRIPT: /opt/secunit.io/bin/restart.sh

jobs:
  deploy:
    name: Deploy (self-hosted)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          ASTRO_SITE_URL: https://secunit.io

      # Assumes /opt/secunit.io (secunit home) and children web/ + bin/ already exist and are writable.
      - name: Publish dist and restart script
        run: |
          rsync -a --delete ./dist/ "${DEPLOY_PATH}/"
          cp scripts/restart.sh "${RESTART_SCRIPT}"
          chmod +x "${RESTART_SCRIPT}"

      - name: Restart application
        run: "${RESTART_SCRIPT}"
